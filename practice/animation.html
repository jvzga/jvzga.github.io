<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Animation Practice</title>
    </head>
    <body>
        <canvas width="800"
                height="800"
                id="myCanvas"
                style="border: 1px solid black;">
        </canvas>         
        <script>
        let x = 1;
        let x2 = 1;
        let speed = 5;
        let time = 0;
        function animate () {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            time = time + 1;
            if(time < 170){
                x = x + speed;
            }
            if(time > 170){
                x2 = x2 + speed;
            }
            ctx.clearRect(0, 0, 800, 800);
            ctx.fillRect(x, 100, 10, 10);
            ctx.fillRect(x2,100,20,20)
            requestAnimationFrame(animate);
        }
        animate();
        </script>
    </body>
</html>
