<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Animation Practice</title>
    </head>
    <body>
        <canvas width="800"
                height="800"
                id="myCanvas"
                style="border: 1px solid black;">
        </canvas>         
        <script>
        // animation state variables
        let time = 0;
        let radius = 0;
        const centerX = 400;
        const centerY = 400;
        const blocks = [];

        function randomColor() {
            // return 6-digit hex
            return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        }

        // initialize 8 blocks with random angles, sizes, and colors
        for (let i = 0; i < 25; i++) {
            blocks.push({
                angle: Math.random() * Math.PI * 2,
                size: 5 + Math.random() * 25,
                color: randomColor()
            });
        }

        function animate () {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');

            time += 1;
            // expand from center
            if (time < 100) {
                radius += 2;           // grow radius/diameter of circle
            } else {
                // once circle is grown, rotate all blocks
                for (const b of blocks) {
                    b.angle += 0.02;      // rotation of blocks
                }
            }

            ctx.clearRect(0, 0, 800, 800);

            // draw each block
            for (const b of blocks) {
                const x = centerX + radius * Math.cos(b.angle);
                const y = centerY + radius * Math.sin(b.angle);
                ctx.fillStyle = b.color;
                ctx.fillRect(x - b.size/2, y - b.size/2, b.size, b.size);
            }
            requestAnimationFrame(animate);
        }
        animate();
        </script>
    </body>
</html>
